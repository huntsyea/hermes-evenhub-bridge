name: Build & publish ASR sidecar

# Builds the Swift FluidAudio sidecar on Apple Silicon and publishes the binary as a
# Release asset on THIS repo, where the plugin's auto-downloader fetches it.
#
# Trigger by pushing a tag like `sidecar-v0.3.0` (version must match __version__ /
# plugin.yaml), or run manually with the version input.
#
# Official release assets must be Developer ID signed + notarized because the
# plugin's auto-downloader verifies the Developer ID Team ID before install.

on:
  push:
    tags:
      - "sidecar-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version, e.g. 0.3.0 (publishes release sidecar-v<version>)"
        required: true
        type: string

permissions:
  contents: write  # create the release on this repo

jobs:
  build:
    runs-on: macos-15  # Apple Silicon; Xcode 16 / Swift 6 (FluidAudio needs tools 6.0)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select latest Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: swift --version

      - name: Validate signing config
        env:
          P12: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          P12_PW: ${{ secrets.DEVID_CERT_PASSWORD }}
          APIKEY: ${{ secrets.AC_API_KEY_P8_BASE64 }}
          APIID: ${{ secrets.AC_API_KEY_ID }}
          APIISS: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          missing=""
          [ -n "$P12" ] || missing="$missing DEVID_CERT_P12_BASE64"
          [ -n "$P12_PW" ] || missing="$missing DEVID_CERT_PASSWORD"
          [ -n "$APIKEY" ] || missing="$missing AC_API_KEY_P8_BASE64"
          [ -n "$APIID" ] || missing="$missing AC_API_KEY_ID"
          [ -n "$APIISS" ] || missing="$missing AC_API_ISSUER_ID"
          if [ -n "$missing" ]; then
            echo "::error::Refusing to publish an unsigned official sidecar. Missing secrets:$missing"
            exit 1
          fi

      - name: Resolve version
        id: ver
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            version="$VERSION_INPUT"
          else
            version="${GITHUB_REF_NAME#sidecar-v}"
          fi
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid sidecar version: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate release tag and version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          TAG="sidecar-v$VERSION"
          git fetch --force --tags origin "refs/tags/$TAG:refs/tags/$TAG" "main:refs/remotes/origin/main"

          TAG_SHA="$(git rev-list -n 1 "$TAG")"
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::$TAG points at $TAG_SHA, but this workflow is running $GITHUB_SHA"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Official sidecar releases must be built from commits on main"
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          root = Path.cwd()
          init_text = (root / "__init__.py").read_text()
          pyproject_text = (root / "pyproject.toml").read_text()
          plugin_text = (root / "plugin.yaml").read_text()
          manifest = json.loads((root / "dashboard" / "manifest.json").read_text())

          expected = {
              "__init__.py": rf'__version__ = "{re.escape(version)}"',
              "pyproject.toml": rf'version = "{re.escape(version)}"',
              "plugin.yaml": rf"version: {re.escape(version)}",
          }
          sources = {
              "__init__.py": init_text,
              "pyproject.toml": pyproject_text,
              "plugin.yaml": plugin_text,
          }
          for name, pattern in expected.items():
              if not re.search(pattern, sources[name]):
                  raise SystemExit(f"{name} does not declare version {version}")
          if manifest.get("version") != version:
              raise SystemExit(f"dashboard/manifest.json does not declare version {version}")
          PY

      - name: Build sidecar (release)
        working-directory: sidecar
        run: swift build -c release

      - name: Stage release asset
        working-directory: sidecar
        run: |
          BIN=$(swift build -c release --show-bin-path)/g2-asr-sidecar
          test -x "$BIN"
          cp "$BIN" g2-asr-sidecar-macos-arm64

      - name: Import & verify Developer ID certificate
        env:
          P12_B64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          P12_PW: ${{ secrets.DEVID_CERT_PASSWORD }}
          KEYCHAIN_PW: actions-temp-keychain
        run: |
          echo "$P12_B64" | base64 --decode > /tmp/devid.p12
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          security import /tmp/devid.p12 -k build.keychain -P "$P12_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" build.keychain
          rm -f /tmp/devid.p12
          echo "Code-signing identities (must include 'Developer ID Application'):"
          security find-identity -v -p codesigning build.keychain
          security find-identity -v -p codesigning build.keychain | grep "Developer ID Application"

      - name: Sign & notarize
        working-directory: sidecar
        env:
          API_KEY_B64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          API_ISSUER: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" g2-asr-sidecar-macos-arm64
          codesign --verify --strict --verbose=2 g2-asr-sidecar-macos-arm64
          echo "$API_KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          ditto -c -k --keepParent g2-asr-sidecar-macos-arm64 /tmp/sidecar.zip
          xcrun notarytool submit /tmp/sidecar.zip \
            --key /tmp/AuthKey.p8 --key-id "$API_KEY_ID" --issuer "$API_ISSUER" --wait
          rm -f /tmp/AuthKey.p8 /tmp/sidecar.zip
          echo "Developer ID signed + notarized."

      - name: Checksum
        working-directory: sidecar
        run: shasum -a 256 g2-asr-sidecar-macos-arm64 > g2-asr-sidecar-macos-arm64.sha256

      - name: Publish release
        working-directory: sidecar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="sidecar-v${{ steps.ver.outputs.version }}"
          gh release create "$TAG" \
            --verify-tag \
            --title "ASR sidecar $TAG" \
            --notes "Prebuilt parakeet ASR sidecar (macOS arm64) for hermes-evenhub-bridge ${{ steps.ver.outputs.version }}." \
            g2-asr-sidecar-macos-arm64 g2-asr-sidecar-macos-arm64.sha256
