name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required check: lint + the gateway-free test suite. Deterministic — no gateway.
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync --locked
      - name: Lint
        run: uv run --locked ruff check .
      - name: Tests (gateway-free)
        run: uv run --locked pytest -m "not gateway" -q

  # Best-effort: run the gateway-marked tests against the real Hermes gateway from
  # PyPI. Not a required check (gateway version drift can break it); it's a canary.
  gateway-integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync --locked
      - name: Tests (gateway, with hermes-agent)
        run: uv run --locked --with hermes-agent pytest -m gateway -q
