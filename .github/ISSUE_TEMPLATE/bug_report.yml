name: Bug report
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: existing
    attributes:
      label: Existing issues
      options:
        - label: I have searched existing issues for this problem
          required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected vs. what occurred. Include logs from `hermes logs` if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 15 / Apple Silicon, Hermes version, plugin version, EVENHUB_BRIDGE_NET=..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste relevant `hermes logs` output. Redact tokens and secrets.
      render: shell
  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
