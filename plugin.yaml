name: hermes-evenhub-bridge
label: Even Realities G2
version: 0.3.1
description: Even Realities G2 smart glasses as a Hermes platform adapter.
kind: platform
requires_env:
  - EVENHUB_BRIDGE_TOKEN
optional_env:
  - name: EVENHUB_BRIDGE_HOST
    description: WebSocket bind host (default 0.0.0.0)
  - name: EVENHUB_BRIDGE_PORT
    description: WebSocket bind port (default 8765)
  - name: EVENHUB_BRIDGE_NET
    description: Reachability mode — both | tailnet | lan (default both)
  - name: EVENHUB_ASR_MODEL
    description: Active ASR model name (parakeet-tdt-0.6b-v2 | parakeet-tdt-0.6b-v3 | whisper-tiny)
